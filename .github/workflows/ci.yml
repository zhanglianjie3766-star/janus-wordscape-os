name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Production dependency audit
        run: corepack pnpm audit --prod

      - name: Typecheck
        run: corepack pnpm run typecheck

      - name: FSRS golden test
        run: corepack pnpm run test:fsrs-golden

      - name: Production build
        run: corepack pnpm run build

      - name: Security input boundary smoke
        run: corepack pnpm run smoke:security
